<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }}</title>
  <style>
    :root {
      --bg-page: #0b1419; --bg-surface: #0f1b21; --bg-surface-2: #122029;
      --border: #1f2e35; --border-strong: #2a3d46;
      --text-primary: #e7ecee; --text-secondary: #9fb6bd; --text-muted: #5c7178; --accent: #3fb6d8;
    }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg-page); color: var(--text-primary); margin: 0; padding: 0; }
    header { background: var(--bg-surface); padding: 14px 20px; font-size: 15px; font-weight: 600; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    header a { font-size: 13px; font-weight: 500; }
    main { padding: 20px; max-width: 1200px; margin: 0 auto; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin: 0 0 14px; }
    .field { display: flex; gap: 6px; align-items: center; font-size: 13px; }
    .field label { color: var(--text-secondary); }
    .field input {
      background: var(--bg-surface); color: var(--text-primary); border: 1px solid var(--border);
      border-radius: 6px; padding: 7px 10px; font-size: 13px;
    }
    .field input:focus { outline: none; border-color: var(--accent); }
    .btn {
      display: inline-flex; align-items: center; height: 32px; background: var(--bg-surface-2);
      border: 1px solid var(--border-strong); color: var(--text-primary);
      padding: 0 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500;
    }
    .btn:hover { background: #16242b; }
    .logbox {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      height: 70vh;
      overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text-secondary);
    }
    .muted { color: var(--text-muted); font-size: 12px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <header>
    {{ page_title }}
    <a href="/">Dashboard</a>
    <a href="/logs">App logs</a>
    <a href="/combined">Combined graph</a>
    <a href="/wifilogs">WiFi logs</a>
  </header>
  <main>
    <div class="muted">{{ page_subtitle }} — live tail (last 50 lines, auto-updating).</div>
    <div class="toolbar">
      <div class="field">
        <label for="filter">Filter</label>
        <input id="filter" type="text" placeholder="substring (case-insensitive)" style="width: 320px;" />
      </div>
      <button id="toggleFollow" class="btn" type="button">Follow: ON</button>
      <button id="clear" class="btn" type="button">Clear</button>
    </div>
    <div id="logbox" class="logbox" role="log" aria-live="polite"></div>
  </main>
  <script>
    const payload = {{ initial_state | safe }};
    const logSource = payload?.source || '';
    const logbox = document.getElementById('logbox');
    const filterEl = document.getElementById('filter');
    const toggleFollowEl = document.getElementById('toggleFollow');
    const clearEl = document.getElementById('clear');
    let follow = true;
    let ws = null;
    let buffer = [];

    function shouldFollow() {
      if (!follow) return false;
      const nearBottom = (logbox.scrollTop + logbox.clientHeight) >= (logbox.scrollHeight - 40);
      return nearBottom;
    }

    function applyFilter(lines) {
      const q = (filterEl.value || '').trim().toLowerCase();
      if (!q) return lines;
      return lines.filter((l) => String(l).toLowerCase().includes(q));
    }

    function render() {
      const before = shouldFollow();
      const lines = applyFilter(buffer);
      logbox.textContent = lines.join('\n');
      if (before) logbox.scrollTop = logbox.scrollHeight;
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/wsexternallogs/${encodeURIComponent(logSource)}`);
      ws.onmessage = (ev) => {
        try {
          const msg = JSON.parse(ev.data || '{}');
          const lines = msg?.data?.lines;
          if (msg?.type === 'log_init' && Array.isArray(lines)) {
            buffer = lines.map((x) => x?.line || '').filter(Boolean);
            render();
            return;
          }
          if (msg?.type === 'log' && Array.isArray(lines)) {
            for (const item of lines) {
              const line = item?.line;
              if (typeof line === 'string' && line.length) buffer.push(line);
            }
            if (buffer.length > 5000) buffer = buffer.slice(buffer.length - 5000);
            render();
          }
        } catch (_e) {}
      };
      ws.onclose = () => setTimeout(connect, 1500);
    }

    toggleFollowEl.onclick = () => {
      follow = !follow;
      toggleFollowEl.textContent = `Follow: ${follow ? 'ON' : 'OFF'}`;
      if (follow) { logbox.scrollTop = logbox.scrollHeight; }
    };
    clearEl.onclick = () => { buffer = []; render(); };
    filterEl.addEventListener('input', () => render());

    render();
    connect();
  </script>
</body>
</html>
