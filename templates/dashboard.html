<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vehicle Monitor</title>
  <style>
    :root {
      --bg-page: #0b1419;
      --bg-surface: #0f1b21;
      --bg-surface-2: #122029;
      --bg-inset: #0b1419;
      --border: #1f2e35;
      --border-strong: #2a3d46;
      --text-primary: #e7ecee;
      --text-secondary: #9fb6bd;
      --text-muted: #5c7178;
      --accent: #3fb6d8;
      --success: #7fcf8e;
      --danger: #e2615a;
      --warning: #e0b34d;
      --radius-card: 12px;
      --radius-sm: 6px;
    }
    * , *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Top bar ─────────────────────────────────────────────── */
    header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 14px 20px 12px;
    }
    .topbar-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .topbar-identity { display: flex; flex-direction: column; min-width: 0; gap: 2px; }
    .topbar-vehicle-name {
      font-size: 16px; font-weight: 600; letter-spacing: -0.1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .topbar-vehicle-desc {
      font-size: 12px; color: var(--text-secondary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .topbar-age { color: var(--text-muted); }
    .topbar-status { display: flex; flex-wrap: wrap; gap: 8px; font-size: 12px; align-items: center; flex: 1; }
    .topbar-right { display: flex; align-items: center; gap: 10px; margin-left: auto; white-space: nowrap; }
    .pill {
      background: var(--bg-surface-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 10px;
      white-space: nowrap;
      font-size: 12px;
      color: var(--text-secondary);
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .dot-ok { background: var(--success); }
    .dot-bad { background: var(--danger); }
    .status-ok  { color: var(--success); }
    .status-bad { color: var(--danger); }

    /* ── Fleet dropdown ──────────────────────────────────────── */
    .fleet-dd { position: relative; display: inline-flex; align-items: center; gap: 6px; }
    .fleet-label { font-size: 12px; color: var(--text-muted); }
    .fleet-btn {
      height: 30px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong);
      background: var(--bg-surface-2); color: var(--text-primary);
      padding: 0 12px; cursor: pointer; font-size: 12px; font-weight: 500;
    }
    .fleet-btn:hover { background: #16242b; }
    .fleet-menu {
      position: absolute; top: calc(100% + 8px); right: 0;
      min-width: 270px; max-height: 320px; overflow: auto;
      background: var(--bg-surface-2); border: 1px solid var(--border-strong);
      border-radius: 10px; box-shadow: 0 12px 28px rgba(0,0,0,0.5);
      padding: 6px; display: none; z-index: 2000;
    }
    .fleet-menu.open { display: block; }
    .fleet-item {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 9px 10px; border-radius: var(--radius-sm);
      color: var(--text-primary); text-decoration: none; font-size: 13px;
    }
    .fleet-item:hover { background: var(--bg-surface); text-decoration: none; }
    .fleet-meta { color: var(--text-muted); font-family: ui-monospace, monospace; font-size: 11px; }

    /* ── Tab bar ─────────────────────────────────────────────── */
    .tab-bar {
      background: var(--bg-page);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 70px;
      z-index: 900;
      display: flex;
      gap: 4px;
      padding: 0 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0; background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--text-secondary); font-size: 13px; font-weight: 500;
      padding: 12px 14px; cursor: pointer; transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active { color: var(--text-primary); border-bottom-color: var(--accent); }

    /* ── Panels ──────────────────────────────────────────────── */
    main { padding: 20px; max-width: 1400px; margin: 0 auto; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .section-title { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; margin: 0 0 10px; }
    .section + .section { margin-top: 24px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
    .card {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--radius-card); padding: 16px;
    }
    .card h3 { margin: 0 0 10px; font-size: 13px; font-weight: 600; color: var(--text-primary); }

    /* ── Status detail cards (GNSS / WiFi) ──────────────────── */
    .detail-row { display: flex; justify-content: space-between; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--bg-inset); font-size: 13px; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--text-secondary); }
    .detail-value { font-weight: 500; text-align: right; }

    /* ── Input / controller points ───────────────────────────── */
    .points { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; }
    .point-row {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--bg-inset); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 8px 10px;
      --on: var(--success); --off: var(--danger);
    }
    .point-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .point-ref   { color: var(--text-muted); font-family: ui-monospace, monospace; font-size: 11px; }
    .point-label { font-weight: 500; font-size: 13px; }
    .point-style { background: var(--bg-surface-2); border-radius: 4px; padding: 2px 7px; font-size: 10px; color: var(--text-secondary); text-transform: capitalize; }
    .point-state { font-weight: 600; font-size: 12px; }
    .state-unknown .point-state { color: var(--text-muted); }
    .point-row.state-on  .point-state { color: var(--on); }
    .point-row.state-off .point-state { color: var(--off); }
    .style-handbrake { --on: var(--danger); --off: var(--success); }
    .style-seatbelt  { --on: var(--success); --off: var(--danger); }
    .style-engine    { --on: var(--success); --off: var(--danger); }
    .style-indicator { --on: var(--warning); --off: var(--text-muted); }

    .gears-block { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .gears-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; margin-bottom: 6px; display: block; }
    .gear-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .gear-btn {
      width: 40px; height: 40px; border-radius: var(--radius-sm); border: 1px solid var(--border);
      background: var(--bg-inset); color: var(--text-secondary); font-weight: 700;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: ui-monospace, monospace; font-size: 13px;
    }
    .gear-btn.gear-on      { background: rgba(127,207,142,0.12); border-color: var(--success); color: var(--success); }
    .gear-btn.gear-unknown { background: var(--bg-inset); border-color: var(--border); color: var(--text-muted); }
    .extra-row { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-secondary); }

    /* ── Charts ──────────────────────────────────────────────── */
    .chart-header { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 8px; }
    .chart-header h3 { margin: 0; }
    .chart-value  { color: var(--text-secondary); font-size: 13px; font-weight: 500; }
    .chart-canvas { width: 100%; height: 110px; background: var(--bg-inset); border: 1px solid var(--border); border-radius: 8px; display: block; }

    /* ── Settings panel ──────────────────────────────────────── */
    .settings-panel { display: flex; flex-direction: column; gap: 10px; max-width: 640px; }
    .settings-row {
      background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-card);
      padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .settings-row-info { display: flex; flex-direction: column; gap: 2px; }
    .settings-row-title { font-weight: 600; font-size: 13px; }
    .settings-row-sub   { font-size: 12px; color: var(--text-muted); }
    .btn {
      height: 32px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong);
      background: var(--bg-surface-2); color: var(--text-primary); font-weight: 500; font-size: 12px;
      padding: 0 14px; cursor: pointer; white-space: nowrap;
    }
    .btn:hover { background: #16242b; }
    .btn-link {
      display: inline-flex; align-items: center; height: 32px; border-radius: var(--radius-sm);
      border: 1px solid var(--border-strong); background: var(--bg-surface-2); color: var(--text-primary);
      font-weight: 500; font-size: 12px; padding: 0 14px; text-decoration: none; white-space: nowrap;
    }
    .btn-link:hover { background: #16242b; text-decoration: none; }
    .settings-row-logs { flex-wrap: wrap; }
    .log-link-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .modbus-status-on  { color: var(--success); font-weight: 600; }
    .modbus-status-off { color: var(--danger); font-weight: 600; }
  </style>
</head>
<body>
  <!-- ── Top bar ──────────────────────────────────────────────── -->
  <header id="mainHeader">
    <div class="topbar-row">
      <div class="topbar-identity">
        <span class="topbar-vehicle-name"><span id="vehicleName"></span></span>
        <span class="topbar-vehicle-desc"><span id="vehicleShortName"></span> <span class="topbar-age" id="age"></span></span>
      </div>

      <div class="topbar-status" id="topbarStatus"></div>

      <div class="topbar-right">
        <div class="fleet-dd" id="fleetDd">
          <span class="fleet-label">Switch</span>
          <button id="fleetBtn" class="fleet-btn" type="button">(fleet)</button>
          <div id="fleetMenu" class="fleet-menu" role="menu" aria-label="Fleet"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- ── Tab bar ──────────────────────────────────────────────── -->
  <nav class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="overview">Overview</button>
    <button class="tab-btn" data-tab="inputs">Inputs</button>
    <button class="tab-btn" data-tab="settings">Settings</button>
  </nav>

  <!-- ── Tab panels ───────────────────────────────────────────── -->
  <main>
    <!-- Overview: status detail + history graphs -->
    <div class="tab-panel active" id="tab-overview">
      <section class="section">
        <div class="section-title">Status</div>
        <div class="grid-2" id="statusDetail"></div>
      </section>
      <section class="section">
        <div class="section-title">History</div>
        <div class="grid" id="history"></div>
      </section>
    </div>

    <!-- Inputs -->
    <div class="tab-panel" id="tab-inputs">
      <section class="grid" id="controllers"></section>
    </div>

    <!-- Settings -->
    <div class="tab-panel" id="tab-settings">
      <div class="settings-panel">
        <div class="settings-row">
          <div class="settings-row-info">
            <span class="settings-row-title">Modbus polling</span>
            <span class="settings-row-sub">Status: <span id="modbusStatusBadge">Modbus: ON</span></span>
          </div>
          <button id="toggleModbus" class="btn">Disable Modbus</button>
        </div>
        <div class="settings-row">
          <div class="settings-row-info">
            <span class="settings-row-title">WiFi capture logs</span>
            <span class="settings-row-sub">Always recording; browse, review and download captured files</span>
          </div>
          <a href="/wifilogs" class="btn-link">Open</a>
        </div>
        <div class="settings-row settings-row-logs">
          <div class="settings-row-info">
            <span class="settings-row-title">Logs</span>
            <span class="settings-row-sub">Live tail of daemon and system log output</span>
          </div>
          <div class="log-link-group">
            <a href="/logs" class="btn-link">App</a>
            <a href="/logs/networkmanager" class="btn-link">NetworkManager</a>
            <a href="/logs/exam-vehicle" class="btn-link">exam-vehicle</a>
            <a href="/logs/wlan-watchdog" class="btn-link">wlan0_watchdog</a>
          </div>
        </div>
        <div class="settings-row">
          <div class="settings-row-info">
            <span class="settings-row-title">Combined graph</span>
            <span class="settings-row-sub">WiFi and gateway metrics on a shared timeline</span>
          </div>
          <a href="/combined" class="btn-link">Open</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    const state = {{ initial_state | safe }};

    const vehicleEl       = document.getElementById('vehicleName');
    const vehicleDescEl   = document.getElementById('vehicleShortName');
    const ageEl           = document.getElementById('age');
    const topbarStatusEl  = document.getElementById('topbarStatus');
    const header          = document.getElementById('mainHeader');
    const tabBar          = document.getElementById('tabBar');
    const fleetDdEl        = document.getElementById('fleetDd');
    const fleetBtnEl       = document.getElementById('fleetBtn');
    const fleetMenuEl      = document.getElementById('fleetMenu');
    const statusDetailEl  = document.getElementById('statusDetail');
    const historyEl       = document.getElementById('history');
    const controllersEl   = document.getElementById('controllers');
    const modbusStatusBadgeEl = document.getElementById('modbusStatusBadge');
    const toggleModbusBtn     = document.getElementById('toggleModbus');

    const FLEET_HTTP_PORT = 9999;
    const onlineByIp = {};
    let wsConn = null;
    let currentModbusEnabled = true;

    // ── Tabs ──────────────────────────────────────────────────────
    function activateTab(name) {
      document.querySelectorAll('.tab-btn').forEach((b) => b.classList.toggle('active', b.dataset.tab === name));
      document.querySelectorAll('.tab-panel').forEach((p) => p.classList.toggle('active', p.id === `tab-${name}`));
      sessionStorage.setItem('activeTab', name);
    }
    tabBar.querySelectorAll('.tab-btn').forEach((btn) => {
      btn.addEventListener('click', () => activateTab(btn.dataset.tab));
    });
    const savedTab = sessionStorage.getItem('activeTab');
    if (savedTab && document.getElementById(`tab-${savedTab}`)) activateTab(savedTab);

    function syncTabBarTop() { tabBar.style.top = `${header.offsetHeight}px`; }
    syncTabBarTop();
    window.addEventListener('resize', syncTabBarTop);

    // ── Helpers ───────────────────────────────────────────────────
    function latencyMsInt(v) {
      if (typeof v !== 'number' || Number.isNaN(v)) return '--';
      return `${Math.round(v)} ms`;
    }

    function fleetLabel(v) {
      const ip   = v?.external_ip || '';
      const name = v?.short_name || v?.name || ip || 'vehicle';
      if (!ip) return `${name} (no ip)`;
      const online = onlineByIp[ip];
      if (online === true)  return `${name} ✅`;
      if (online === false) return `${name} 🚫`;
      return `${name} (--)`;
    }
    function fleetNameOnly(v) { return v?.short_name || v?.name || v?.external_ip || '(fleet)'; }
    function buildFleetUrl(ip) {
      if (!ip) return null;
      return `http://${ip}:${FLEET_HTTP_PORT}${location.pathname || '/'}`;
    }

    // ── Fleet selector ───────────────────────────────────────────
    function syncFleetSelector(state) {
      const fleet = Array.isArray(state?.fleet) ? state.fleet : [];
      const currentIp =
        fleet.find((v) => v?.short_name && state?.vehicle_short && v.short_name === state.vehicle_short)?.external_ip
        || fleet.find((v) => v?.name && state?.vehicle && v.name === state.vehicle)?.external_ip
        || null;
      const current = currentIp ? fleet.find((v) => v?.external_ip === currentIp) : null;
      fleetBtnEl.textContent = current ? fleetNameOnly(current) : '(fleet)';

      fleetMenuEl.innerHTML = '';
      fleet.forEach((v) => {
        const ip = v?.external_ip;
        if (!ip) return;
        const a = document.createElement('a');
        a.className = 'fleet-item';
        a.href = buildFleetUrl(ip) || '#';
        const left = document.createElement('span');
        left.textContent = fleetLabel(v);
        const right = document.createElement('span');
        right.className = 'fleet-meta';
        right.textContent = ip;
        a.appendChild(left);
        a.appendChild(right);
        fleetMenuEl.appendChild(a);
      });
    }

    async function probeIp(ip) {
      if (!ip) return false;
      try {
        const res = await fetch(`http://${ip}:${FLEET_HTTP_PORT}/ping?ts=${Date.now()}`, { cache: 'no-store' });
        return res && (res.status === 204 || res.ok);
      } catch (e) { return false; }
    }
    async function scanFleetOnline(state) {
      const fleet = Array.isArray(state?.fleet) ? state.fleet : [];
      await Promise.all(
        fleet.map((v) => v?.external_ip).filter(Boolean).map(async (ip) => {
          onlineByIp[ip] = await probeIp(ip);
        })
      );
      syncFleetSelector(state);
    }

    // ── Top-bar status pills ─────────────────────────────────────
    function renderTopbarStatus(state) {
      const pills = [];
      const latency = state.display_latency || {};
      const gateway = latency.gateway || Object.values(latency)[0];
      if (gateway) {
        const ok = gateway.status === 'OK';
        pills.push(`<span class="pill"><span class="dot ${ok ? 'dot-ok' : 'dot-bad'}"></span>gateway ${latencyMsInt(gateway.latency_ms)}</span>`);
      } else {
        pills.push('<span class="pill">gateway --</span>');
      }

      for (const [name, info] of Object.entries(state.controllers || {})) {
        const ok = info.status === 'OK';
        pills.push(`<span class="pill"><span class="dot ${ok ? 'dot-ok' : 'dot-bad'}"></span>${name} ${latencyMsInt(info.latency)}</span>`);
      }

      const gnss = state.gnss || {};
      pills.push(`<span class="pill">GNSS ${gnss.fix || '--'}</span>`);

      const wifi = state.wifi || {};
      const level = wifi.signal || (typeof wifi.signal_dbm === 'number' ? `${Math.round(wifi.signal_dbm)} dBm` : '--');
      pills.push(`<span class="pill">${wifi.ssid || 'wifi'} ${level}</span>`);

      topbarStatusEl.innerHTML = pills.join('');

      const modbusCfg = state.modbus || {};
      currentModbusEnabled = modbusCfg.enabled !== false;
      modbusStatusBadgeEl.className  = currentModbusEnabled ? 'modbus-status-on' : 'modbus-status-off';
      modbusStatusBadgeEl.textContent = currentModbusEnabled ? 'ON' : 'OFF';
      toggleModbusBtn.textContent = currentModbusEnabled ? 'Disable Modbus' : 'Enable Modbus';

      syncTabBarTop();
    }

    // ── Overview: GNSS / WiFi detail cards ───────────────────────
    function renderStatusDetail(state) {
      statusDetailEl.innerHTML = '';

      const gnss = state.gnss;
      const gnssCard = document.createElement('div');
      gnssCard.className = 'card';
      if (!gnss) {
        gnssCard.innerHTML = '<h3>GNSS</h3><div class="detail-row"><span class="detail-label">No data</span></div>';
      } else {
        const age = ((Date.now() / 1000) - (gnss.ts || 0)).toFixed(1);
        gnssCard.innerHTML = `
          <h3>GNSS</h3>
          <div class="detail-row"><span class="detail-label">Fix</span><span class="detail-value">${gnss.fix || 'NO FIX'}</span></div>
          <div class="detail-row"><span class="detail-label">Solution level</span><span class="detail-value">${gnss.solution_level || '--'}</span></div>
          <div class="detail-row"><span class="detail-label">Satellites</span><span class="detail-value">${gnss.sats ?? '--'}</span></div>
          <div class="detail-row"><span class="detail-label">HDOP</span><span class="detail-value">${gnss.hdop ?? '--'}</span></div>
          <div class="detail-row"><span class="detail-label">Position</span><span class="detail-value">${gnss.lat ?? '--'}, ${gnss.lon ?? '--'}</span></div>
          <div class="detail-row"><span class="detail-label">Data age</span><span class="detail-value">${age} s</span></div>`;
      }
      statusDetailEl.appendChild(gnssCard);

      const wifi = state.wifi;
      const wifiCard = document.createElement('div');
      wifiCard.className = 'card';
      if (!wifi) {
        wifiCard.innerHTML = '<h3>WiFi</h3><div class="detail-row"><span class="detail-label">No data</span></div>';
      } else {
        let rows = '';
        if (wifi.status === 'connected') {
          rows += `<div class="detail-row"><span class="detail-label">Status</span><span class="detail-value status-ok">Connected</span></div>`;
          rows += `<div class="detail-row"><span class="detail-label">SSID</span><span class="detail-value">${wifi.ssid || '--'}</span></div>`;
          rows += `<div class="detail-row"><span class="detail-label">BSSID</span><span class="detail-value">${wifi.bssid || '--'}</span></div>`;
          if (wifi.signal) rows += `<div class="detail-row"><span class="detail-label">Signal</span><span class="detail-value">${wifi.signal}</span></div>`;
          if (wifi.freq)   rows += `<div class="detail-row"><span class="detail-label">Frequency</span><span class="detail-value">${wifi.freq}</span></div>`;
          if (typeof wifi.bssid_change_ms === 'number')
            rows += `<div class="detail-row"><span class="detail-label">Last switch</span><span class="detail-value">${wifi.bssid_change_ms} ms</span></div>`;
        } else {
          rows += `<div class="detail-row"><span class="detail-label">Status</span><span class="detail-value status-bad">${wifi.status || 'unknown'}</span></div>`;
          if (wifi.error) rows += `<div class="detail-row"><span class="detail-label">Error</span><span class="detail-value">${wifi.error}</span></div>`;
        }
        wifiCard.innerHTML = `<h3>WiFi</h3>${rows}`;
      }
      statusDetailEl.appendChild(wifiCard);
    }

    // ── Overview: history graphs ─────────────────────────────────
    function lastNumeric(series) {
      if (!Array.isArray(series)) return null;
      for (let i = series.length - 1; i >= 0; i -= 1) {
        const val = series[i]?.value;
        if (typeof val === 'number') return val;
      }
      return null;
    }
    function sanitizeGraphValue(v) {
      if (typeof v !== 'number' || Number.isNaN(v) || !Number.isFinite(v)) return null;
      if (v < -1000) return -1;
      return v;
    }
    function drawSeries(canvas, series, color) {
      const ctx = canvas.getContext('2d');
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      const points = (series || [])
        .map((item) => ({ ts: item?.ts, value: sanitizeGraphValue(item?.value) }))
        .filter((item) => typeof item?.value === 'number');
      if (!points.length) {
        ctx.fillStyle = '#5c7178';
        ctx.font = '12px sans-serif';
        ctx.fillText('no data', 10, 20);
        return;
      }
      const values = points.map((p) => p.value);
      const minVal = Math.min(...values);
      const maxVal = Math.max(...values);
      const span   = maxVal - minVal || 1;
      const view   = points.slice(-120);
      ctx.strokeStyle = color || '#3fb6d8';
      ctx.lineWidth = 2;
      ctx.beginPath();
      view.forEach((p, i) => {
        const x = (i / Math.max(view.length - 1, 1)) * (w - 20) + 10;
        const y = h - 10 - ((p.value - minVal) / span) * (h - 20);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.stroke();
      ctx.fillStyle = '#5c7178';
      ctx.font = '10px sans-serif';
      ctx.fillText(minVal.toFixed(1), 8, h - 4);
      ctx.fillText(maxVal.toFixed(1), 8, 12);
    }

    function renderHistory(history) {
      historyEl.innerHTML = '';
      if (!history) return;

      const seriesRate = (series) => {
        if (!Array.isArray(series) || series.length < 2) return [];
        const out = [];
        for (let i = 1; i < series.length; i += 1) {
          const prev = series[i - 1], cur = series[i];
          if (typeof prev?.value !== 'number' || typeof cur?.value !== 'number') continue;
          if (typeof prev?.ts   !== 'number' || typeof cur?.ts   !== 'number')   continue;
          const dt = cur.ts - prev.ts;
          if (dt <= 0) continue;
          out.push({ ts: cur.ts, value: sanitizeGraphValue((cur.value - prev.value) / dt / 1024.0) ?? -1 });
        }
        return out;
      };

      const makeCard = (title, series, unit, color) => {
        const card = document.createElement('div');
        card.className = 'card';
        const header = document.createElement('div');
        header.className = 'chart-header';
        const heading = document.createElement('h3');
        heading.textContent = title;
        const valueEl = document.createElement('div');
        valueEl.className = 'chart-value';
        const lastVal = lastNumeric(series);
        valueEl.textContent = lastVal === null ? '--' : `${lastVal.toFixed(1)}${unit}`;
        header.appendChild(heading);
        header.appendChild(valueEl);
        const canvas = document.createElement('canvas');
        canvas.className = 'chart-canvas';
        canvas.width = 320; canvas.height = 110;
        card.appendChild(header);
        card.appendChild(canvas);
        drawSeries(canvas, series, color);
        historyEl.appendChild(card);
      };

      for (const [name, series] of Object.entries(history.modbus_latency || {}))
        makeCard(`Modbus latency ${name}`, series, ' ms', '#7fcf8e');
      for (const [name, series] of Object.entries(history.gateway_latency || {}))
        makeCard(`Gateway latency ${name}`, series, ' ms', '#e0b34d');

      const wifi = history.wifi || {};
      if (wifi.signal_dbm?.length)   makeCard('WiFi signal',        wifi.signal_dbm,            ' dBm',  '#3fb6d8');
      if (wifi.tx_rate_mbps?.length) makeCard('WiFi TX rate',       wifi.tx_rate_mbps,          ' Mbps', '#7fcf8e');
      if (wifi.rx_rate_mbps?.length) makeCard('WiFi RX rate',       wifi.rx_rate_mbps,          ' Mbps', '#e0b34d');
      if (wifi.tx_bytes?.length)     makeCard('WiFi TX throughput', seriesRate(wifi.tx_bytes),  ' KB/s', '#7f77dd');
      if (wifi.rx_bytes?.length)     makeCard('WiFi RX throughput', seriesRate(wifi.rx_bytes),  ' KB/s', '#d4537e');
      if (history.cpu_load?.length)  makeCard('CPU load',           history.cpu_load,           ' %',    '#d4537e');
      if (history.cpu_temp_c?.length) makeCard('SoC temp',          history.cpu_temp_c,         ' \u00b0C', '#d85a30');
    }

    // ── Inputs tab ────────────────────────────────────────────────
    function renderControllers(ctrls) {
      controllersEl.innerHTML = '';
      for (const [name, info] of Object.entries(ctrls || {})) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<h3>${name}</h3>`;

        const ul = document.createElement('ul');
        ul.className = 'points';
        const meta = info.points_meta || {};
        for (const [ref, val] of Object.entries(info.points || {})) {
          const pointMeta  = meta[ref] || {};
          const stateTxt   = val === null ? 'N/A' : (val ? 'ON' : 'OFF');
          const stateClass = val === null ? 'state-unknown' : (val ? 'state-on' : 'state-off');
          const style = pointMeta.style || 'default';
          const di    = typeof pointMeta.di === 'number' ? `DI${pointMeta.di.toString().padStart(2, '0')}` : ref;
          const li = document.createElement('li');
          li.className = `point-row ${stateClass} style-${style}`;

          const left = document.createElement('div');
          left.className = 'point-left';
          const refEl = document.createElement('span');
          refEl.className = 'point-ref';
          refEl.textContent = di;
          const labelEl = document.createElement('span');
          labelEl.className = 'point-label';
          labelEl.textContent = pointMeta.label || ref;
          const styleEl = document.createElement('span');
          styleEl.className = 'point-style';
          styleEl.textContent = style;
          left.appendChild(refEl);
          left.appendChild(labelEl);
          left.appendChild(styleEl);

          const stateEl = document.createElement('div');
          stateEl.className = 'point-state';
          stateEl.textContent = stateTxt;

          li.appendChild(left);
          li.appendChild(stateEl);
          ul.appendChild(li);
        }
        card.appendChild(ul);

        if (Object.keys(info.gears || {}).length) {
          const block = document.createElement('div');
          block.className = 'gears-block';
          const label = document.createElement('span');
          label.className = 'gears-label';
          label.textContent = 'Gears';
          const grid = document.createElement('div');
          grid.className = 'gear-grid';
          for (const [ref, v] of Object.entries(info.gears || {})) {
            const btn = document.createElement('div');
            btn.className = 'gear-btn ' + (v === null ? 'gear-unknown' : (v ? 'gear-on' : 'gear-off'));
            btn.textContent = ref;
            grid.appendChild(btn);
          }
          block.appendChild(label);
          block.appendChild(grid);
          card.appendChild(block);
        }

        if (Object.keys(info.extra || {}).length) {
          const extra = document.createElement('div');
          extra.className = 'extra-row';
          extra.innerHTML = '<strong>Extra:</strong> ' +
            Object.entries(info.extra || {}).map(([ref, v]) => `${ref}: ${v ? 'ON' : 'off'}`).join('  \u00b7  ');
          card.appendChild(extra);
        }

        controllersEl.appendChild(card);
      }
    }

    // ── Master render ─────────────────────────────────────────────
    function render(state) {
      vehicleEl.textContent     = state.vehicle || 'vehicle';
      vehicleDescEl.textContent = state.vehicle_short || '';
      const ageSecs = state.last_update ? (Date.now() / 1000 - state.last_update).toFixed(1) : 'n/a';
      ageEl.textContent = `(age ${ageSecs}s)`;
      syncFleetSelector(state);
      renderTopbarStatus(state);
      renderStatusDetail(state);
      renderHistory(state.history);
      renderControllers(state.controllers || {});
    }

    // ── WebSocket ────────────────────────────────────────────────
    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${proto}://${location.host}/ws`);
      wsConn = ws;
      ws.onmessage = (ev) => {
        try {
          const msg = JSON.parse(ev.data);
          if (msg.type === 'state') render(msg.data);
        } catch (e) { console.error(e); }
      };
      ws.onclose = () => setTimeout(connect, 2000);
    }

    // ── Event handlers ──────────────────────────────────────────
    fleetBtnEl.onclick = () => fleetMenuEl.classList.toggle('open');
    document.addEventListener('click', (ev) => {
      if (!fleetDdEl.contains(ev.target)) fleetMenuEl.classList.remove('open');
    });

    toggleModbusBtn.onclick = () => {
      if (!wsConn || wsConn.readyState !== WebSocket.OPEN) return;
      wsConn.send(JSON.stringify({ type: 'set_modbus_enabled', enabled: !currentModbusEnabled }));
    };

    // ── Boot ─────────────────────────────────────────────────────
    render(state);
    connect();
    scanFleetOnline(state);
    setInterval(() => scanFleetOnline(state), 10_000);
  </script>
</body>
</html>
