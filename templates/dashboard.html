<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vehicle Monitor</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0b1e24; color: #e8f1f2; margin: 0; padding: 0; }
    header { background: #12313b; padding: 12px 16px; font-size: 20px; }
    main { padding: 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 12px; }
    .card { background: #11232b; border: 1px solid #1c3a43; border-radius: 6px; padding: 12px; }
    .card h3 { margin-top: 0; }
    .status-ok { color: #4caf50; }
    .status-bad { color: #f44336; }
    .points { list-style: none; padding: 0; margin: 0; }
    .points li { padding: 2px 0; }
    code { background: #0e1a1f; padding: 2px 4px; border-radius: 3px; }
  </style>
</head>
<body>
  <header>Vehicle Monitor — <span id="vehicleName"></span> <small id="age"></small></header>
  <main>
    <section id="latency"></section>
    <section class="grid" id="controllers"></section>
    <section id="gnss"></section>
    <section id="wifi"></section>
  </main>
  <script>
    const state = {{ initial_state | safe }};
    const vehicleEl = document.getElementById('vehicleName');
    const ageEl = document.getElementById('age');
    const controllersEl = document.getElementById('controllers');
    const latencyEl = document.getElementById('latency');
    const gnssEl = document.getElementById('gnss');
    const wifiEl = document.getElementById('wifi');

    function renderLatency(data) {
      if (!data || Object.keys(data).length === 0) { latencyEl.innerHTML = ''; return; }
      let html = '<h3>Latency checks</h3><ul>';
      for (const [name, info] of Object.entries(data)) {
        const cls = info.status === 'OK' ? 'status-ok' : 'status-bad';
        html += `<li><strong>${name}</strong> (${info.host}:${info.port}): <span class="${cls}">${info.status}</span> ${info.latency || ''}</li>`;
      }
      html += '</ul>';
      latencyEl.innerHTML = html;
    }

    function renderControllers(ctrls) {
      controllersEl.innerHTML = '';
      for (const [name, info] of Object.entries(ctrls || {})) {
        const card = document.createElement('div');
        card.className = 'card';
        const statusClass = info.status === 'OK' ? 'status-ok' : 'status-bad';
        card.innerHTML = `<h3>${name}</h3><div>Status: <span class="${statusClass}">${info.status || '—'}</span> Latency: ${info.latency ?? '--'} ms</div>`;
        const ul = document.createElement('ul');
        ul.className = 'points';
        for (const [ref, val] of Object.entries(info.points || {})) {
          const stateTxt = val === null ? 'N/A' : (val ? 'ON' : 'OFF');
          const cls = val ? 'status-ok' : 'status-bad';
          const li = document.createElement('li');
          li.innerHTML = `<code>${ref}</code>: <span class="${cls}">${stateTxt}</span>`;
          ul.appendChild(li);
        }
        if (Object.keys(info.gears || {}).length) {
          const li = document.createElement('li');
          li.innerHTML = '<strong>Gears:</strong> ' + Object.entries(info.gears || {}).map(([ref, v]) => `${ref}:${v ? 'ON' : 'off'}`).join(' ');
          ul.appendChild(li);
        }
        if (Object.keys(info.extra || {}).length) {
          const li = document.createElement('li');
          li.innerHTML = '<strong>Extra:</strong> ' + Object.entries(info.extra || {}).map(([ref, v]) => `${ref}:${v ? 'ON' : 'off'}`).join(' ');
          ul.appendChild(li);
        }
        card.appendChild(ul);
        controllersEl.appendChild(card);
      }
    }

    function renderGnss(data) {
      if (!data) { gnssEl.innerHTML = ''; return; }
      const age = ((Date.now()/1000) - (data.ts || 0)).toFixed(1);
      gnssEl.innerHTML = `<h3>GNSS</h3><div>Fix: ${data.fix || 'NO FIX'}, Sats: ${data.sats ?? '--'}, HDOP: ${data.hdop ?? '--'}, Age: ${age}s</div><div>Pos: ${data.lat ?? '--'}, ${data.lon ?? '--'}</div>`;
    }

    function renderWifi(data) {
      if (!data) { wifiEl.innerHTML = ''; return; }
      let html = '<h3>WiFi</h3>';
      if (data.status === 'connected') {
        html += `Connected to ${data.ssid || '(ssid ?)'} (${data.bssid || '--'}) ${data.signal || ''} ${data.freq || ''}`;
      } else {
        html += data.status;
        if (data.error) html += ' - ' + data.error;
      }
      wifiEl.innerHTML = html;
    }

    function render(state) {
      vehicleEl.textContent = state.vehicle || 'vehicle';
      const ageSecs = state.last_update ? (Date.now()/1000 - state.last_update).toFixed(1) : 'n/a';
      ageEl.textContent = `(age ${ageSecs}s)`;
      renderControllers(state.controllers || {});
      renderLatency(state.display_latency || {});
      renderGnss(state.gnss);
      renderWifi(state.wifi);
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${proto}://${location.host}/ws`);
      ws.onmessage = (ev) => {
        try { const msg = JSON.parse(ev.data); if (msg.type === 'state') render(msg.data); } catch (e) { console.error(e); }
      };
      ws.onclose = () => setTimeout(connect, 2000);
    }

    render(state);
    connect();
  </script>
</body>
</html>
