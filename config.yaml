# config.yaml — sample configuration
# Define your Modbus/TCP devices
devices:
  - name: mb_io_1
    host: 172.16.101.4
    port: 502
    unit_id: 1
    timeout: 3.0

  - name: mb_io_2
    host: 172.16.101.5
    port: 502
    unit_id: 1
    timeout: 3.0


# Global settings
settings:
  poll_interval_ms: 100   # how often to read inputs
  log_level: INFO         # DEBUG/INFO/WARNING/ERROR
  connect_retry_s: 3.0    # backoff for reconnect

# Mappings: strictly 1 input -> 1 output per entry
mappings:
  - name: cpp_neutral
    input:
      device: mb_io_1
      address: 2               # read DI 0
      source_type: discrete_input  # or "coil" to read coil
    output:
      device: mb_io_1
      address: 0               # write to coil 0
    invert: false
    debounce_ms: 50
    on_error: hold             # hold | force_off | force_on

  - name: park_break
    input:
      device: mb_io_1
      address: 5
      source_type: discrete_input
    output:
      device: mb_io_1
      address: 1
    invert: true               # logical NOT of the input
    debounce_ms: 100
    on_error: force_off

